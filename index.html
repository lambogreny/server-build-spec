<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Server Build · สรุปสเปค 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@mui/material@5.16.7/umd/material-ui.production.min.js"></script>
<style>
  html,body{margin:0;}
  *{font-family:'IBM Plex Sans Thai','Noto Sans Thai',sans-serif;}
  .ms{font-family:'Material Symbols Rounded' !important;font-weight:normal;font-style:normal;line-height:1;-webkit-font-feature-settings:'liga';-webkit-font-smoothing:antialiased;}
</style>
</head>
<body>
<div id="root"></div>
<script>
const e = React.createElement;
const { useState, useMemo } = React;
const M = MaterialUI;
const { ThemeProvider, createTheme, CssBaseline, AppBar, Toolbar, Container, Box, Stack, Paper,
  Card, CardHeader, CardContent, Typography, Chip, Avatar, Divider, List, ListItem, ListItemAvatar,
  ListItemText, Table, TableHead, TableBody, TableRow, TableCell, TableContainer, LinearProgress,
  IconButton, Tooltip, Tabs, Tab, Badge, Grow, Fade, ToggleButton, ToggleButtonGroup } = M;

const Sym = (name, size=24) => e('span',{className:'ms', style:{fontSize:size}}, name);
const storeColor = { 'Advice':'error', 'Shopee':'warning', 'มีอยู่แล้ว':'success' };
const parts = [
  { icon:'memory',          cat:'CPU',       name:'Intel Core Ultra 7 270K Plus', spec:'24C / 24T · 5.5 GHz · LGA1851', store:'Advice', us:13090, comp:12990 },
  { icon:'developer_board', cat:'MAINBOARD', name:'ASRock Z890 Pro RS DDR5', spec:'ATX · LGA1851', store:'Advice', us:6240, comp:7770 },
  { icon:'memory_alt',      cat:'RAM',       name:'Corsair Vengeance RGB DDR5 192GB', spec:'48GB × 4 · 5200 MHz', store:'มีอยู่แล้ว', us:null, comp:null },
  { icon:'videogame_asset', cat:'GPU',       name:'NVIDIA GeForce RTX 3070', spec:'8GB GDDR6', store:'มีอยู่แล้ว', us:null, comp:null },
  { icon:'storage',         cat:'STORAGE',   name:'WD Black SN7100 1TB', spec:'M.2 NVMe · PCIe 4.0', store:'Shopee', us:4703, comp:6490 },
  { icon:'bolt',            cat:'PSU',       name:'Corsair RM850e 850W', spec:'80+ Gold · Full Modular', store:'Advice', us:3500, comp:3690 },
  { icon:'ac_unit',         cat:'COOLER',    name:'Thermaltake Astria 600', spec:'Air · Dual-Tower', store:'Advice', us:2100, comp:2100 },
  { icon:'dns',             cat:'CASE',      name:'ASUS A31 Plus TG ARGB', spec:'ATX · 4× ARGB Fans', store:'Shopee', us:2071, comp:2590 },
];
const fmt = n => '฿'+Number(n).toLocaleString();
const usTotal = parts.reduce((s,p)=>s+(p.us||0),0);
const compTotal = parts.reduce((s,p)=>s+(p.comp||0),0);
const saved = compTotal - usTotal;
const savedPct = Math.round(saved/compTotal*100);
const newItems = parts.filter(p=>p.us!=null).length;

function HeroCard(){
  return e(Grow,{in:true, timeout:600},
    e(Card,{variant:'outlined'},
      e(CardContent,null,
        e(Stack,{direction:'row', justifyContent:'space-between', alignItems:'flex-start'},
          e(Box,null,
            e(Typography,{variant:'overline', color:'text.secondary'}, 'ประหยัดเทียบ iHAVECPU'),
            e(Typography,{variant:'h4', fontWeight:700, color:'success.main', lineHeight:1.1}, '~'+fmt(saved)),
          ),
          e(Chip,{color:'success', label:'−'+savedPct+'%', icon:e('span',{className:'ms',style:{fontSize:18,marginLeft:6}},'trending_down'), sx:{fontWeight:700}})
        ),
        e(Tooltip,{title:'ราคาเรา '+fmt(usTotal)+' จากราคาปกติ '+fmt(compTotal), arrow:true, placement:'top'},
          e(LinearProgress,{variant:'determinate', value:savedPct, color:'success', sx:{mt:2, height:10, borderRadius:5}})
        ),
        e(Stack,{direction:'row', justifyContent:'space-between', sx:{mt:1}},
          e(Typography,{variant:'caption', color:'text.secondary'}, 'เรา '+fmt(usTotal)),
          e(Typography,{variant:'caption', color:'text.secondary'}, 'ปกติ '+fmt(compTotal))
        ),
        e(Divider,{sx:{my:1.5}}),
        e(Stack,{direction:'row', spacing:1, flexWrap:'wrap', useFlexGap:true},
          e(Chip,{size:'small', variant:'outlined', icon:e('span',{className:'ms',style:{fontSize:16,marginLeft:6}},'sell'), label:'โค้ด Advice −฿996'}),
          e(Chip,{size:'small', variant:'outlined', icon:e('span',{className:'ms',style:{fontSize:16,marginLeft:6}},'inventory_2'), label:'ครบ 8 รายการ'}),
          e(Chip,{size:'small', variant:'outlined', color:'primary', icon:e('span',{className:'ms',style:{fontSize:16,marginLeft:6}},'dns'), label:'Server 24/7'})
        )
      )
    )
  );
}

function PartRow(p, last){
  return e(React.Fragment,null,
    e(ListItem,{sx:{px:2.5, py:1.75}, secondaryAction:
      e(Stack,{spacing:0.75, alignItems:'flex-end'},
        p.us!=null
          ? e(Typography,{variant:'subtitle1', fontWeight:700}, fmt(p.us))
          : e(Typography,{variant:'body2', color:'success.main', fontWeight:600}, 'มีอยู่แล้ว'),
        e(Tooltip,{title:'ซื้อจาก '+p.store, arrow:true},
          e(Chip,{label:p.store, color:storeColor[p.store], size:'small', variant: p.us!=null?'filled':'outlined', sx:{height:22, fontSize:12, fontWeight:600}}))
      )
    },
      e(ListItemAvatar,null, e(Avatar,{variant:'rounded', sx:{width:44, height:44}}, Sym(p.icon,24))),
      e(ListItemText,{
        sx:{pr:1},
        primaryTypographyProps:{fontWeight:600, noWrap:true},
        secondaryTypographyProps:{variant:'body2', component:'div'},
        primary:p.name,
        secondary:e(Box,{component:'span', sx:{display:'block'}},
          e(Typography,{component:'span', variant:'caption', color:'primary.main', sx:{textTransform:'uppercase', letterSpacing:1, fontWeight:700}}, p.cat),
          e('span',{style:{opacity:0.85}}, '  ·  '+p.spec)
        )
      })
    ),
    last ? null : e(Divider,{component:'li', variant:'inset', sx:{ml:'72px'}})
  );
}

function PriceCol(label, value, opts){
  opts = opts || {};
  return e(Stack,{spacing:0.25, alignItems: opts.align||'flex-start', sx:{flex:1, minWidth:0}},
    e(Typography,{variant:'caption', color:'text.secondary', sx:{textTransform:'uppercase', letterSpacing:0.5}}, label),
    e(Typography,{sx:{typography:'subtitle1', fontWeight:opts.bold?700:600, color: opts.color||'text.primary', whiteSpace:'nowrap'}}, value)
  );
}

function CompareCard(p){
  const d = p.comp - p.us;
  const better = d > 0;
  return e(Card,{variant:'outlined'},
    e(CardContent,{sx:{py:1.75, '&:last-child':{pb:1.75}}},
      e(Stack,{direction:'row', spacing:1, alignItems:'center', sx:{mb:1.5}},
        e(Chip,{label:p.cat, size:'small', color:'primary', variant:'outlined', sx:{height:22, fontSize:11, fontWeight:700}}),
        e(Typography,{noWrap:true, sx:{typography:'body1', fontWeight:600, flex:1, minWidth:0}}, p.name)
      ),
      e(Stack,{direction:'row', alignItems:'center', spacing:1},
        PriceCol('ราคาเรา', fmt(p.us), {color:'success.main', bold:true}),
        e(Divider,{orientation:'vertical', flexItem:true}),
        PriceCol('iHAVECPU', fmt(p.comp), {color:'text.secondary', align:'center'}),
        e(Divider,{orientation:'vertical', flexItem:true}),
        e(Chip,{size:'small',
          color: d>0?'success':(d<0?'error':'default'),
          variant: d===0?'outlined':'filled',
          icon: d!==0 ? e('span',{className:'ms',style:{fontSize:16,marginLeft:6}}, better?'arrow_downward':'arrow_upward') : undefined,
          label: (d>0?'ถูกกว่า ':(d<0?'แพงกว่า ':'เท่ากัน'))+(d!==0?fmt(Math.abs(d)):''),
          sx:{fontWeight:700} })
      )
    )
  );
}

function CompareView(){
  return e(Box,{sx:{p:2}},
    e(Stack,{spacing:1.5},
      ...parts.filter(p=>p.us!=null).map((p,i)=>e(CompareCard,{key:i, ...p})),
      e(Card,{sx:{bgcolor:'success.main', color:'success.contrastText'}},
        e(CardContent,{sx:{py:2, '&:last-child':{pb:2}}},
          e(Stack,{direction:'row', justifyContent:'space-between', alignItems:'center'},
            e(Box,null,
              e(Typography,{variant:'overline', sx:{opacity:0.9}}, 'รวมประหยัด'),
              e(Typography,{variant:'h5', fontWeight:700}, '+'+fmt(saved))
            ),
            e(Stack,{alignItems:'flex-end'},
              e(Typography,{variant:'caption', sx:{opacity:0.9}}, 'เรา '+fmt(usTotal)),
              e(Typography,{variant:'caption', sx:{opacity:0.9, textDecoration:'line-through'}}, 'ปกติ '+fmt(compTotal))
            )
          )
        )
      )
    )
  );
}

function App(){
  const [mode, setMode] = useState('dark');
  const [tab, setTab] = useState(0);
  const theme = useMemo(()=>createTheme({
    palette:{ mode },
    typography:{ fontFamily:'IBM Plex Sans Thai, Noto Sans Thai, sans-serif' },
    shape:{ borderRadius:12 }
  }), [mode]);

  return e(ThemeProvider,{theme},
    e(CssBaseline),
    e(Box,{sx:{minHeight:'100vh', bgcolor:'background.default'}},
      e(AppBar,{position:'sticky', color:'default', elevation:0, sx:{borderBottom:1, borderColor:'divider', bgcolor:'background.paper'}},
        e(Toolbar,null,
          e(Avatar,{variant:'rounded', sx:{bgcolor:'primary.main', color:'primary.contrastText', mr:1.5, width:36, height:36}}, Sym('dns',20)),
          e(Box,{sx:{flexGrow:1}},
            e(Typography,{variant:'subtitle1', fontWeight:700, lineHeight:1.1}, 'Server Build'),
            e(Typography,{variant:'caption', color:'text.secondary'}, 'สรุปสเปค · มิ.ย. 2026')
          ),
          e(ToggleButtonGroup,{size:'small', exclusive:true, value:mode, onChange:(ev,v)=>{ if(v) setMode(v); }},
            e(ToggleButton,{value:'light'}, Sym('light_mode',18)),
            e(ToggleButton,{value:'dark'}, Sym('dark_mode',18))
          )
        )
      ),
      e(Container,{maxWidth:'sm', sx:{py:3}},
        e(Stack,{spacing:2.5},
          HeroCard(),
          e(Paper,{variant:'outlined', sx:{overflow:'hidden'}},
            e(Tabs,{value:tab, onChange:(ev,v)=>setTab(v), variant:'fullWidth', sx:{borderBottom:1, borderColor:'divider'}},
              e(Tab,{iconPosition:'start', icon:Sym('list_alt',20), label:e(Badge,{badgeContent:parts.length, color:'primary', sx:{'& .MuiBadge-badge':{right:-14, top:2}}}, 'อุปกรณ์')}),
              e(Tab,{iconPosition:'start', icon:Sym('balance',20), label:'เปรียบเทียบ'})
            ),
            e(Fade,{in:true, timeout:400, key:tab},
              e(Box,null,
                tab===0
                  ? e(List,{disablePadding:true}, ...parts.map((p,i)=>e(React.Fragment,{key:i}, PartRow(p, i===parts.length-1))))
                  : CompareView()
              )
            )
          ),
          e(Typography,{variant:'caption', color:'text.secondary', align:'center', sx:{pb:2}},
            'จัดซื้อโดยเลขาช่วยซื้อของ · myshoping')
        )
      )
    )
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
window.__rendered = true;
</script>
</body>
</html>
